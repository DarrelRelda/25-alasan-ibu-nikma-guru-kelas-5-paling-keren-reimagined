<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25 (10) Alasan Ibu Nikma Guru Kelas 5 Paling Keren — Reimagined</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0a0c14;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --text:    #e8eaf0;
      --muted:   rgba(232,234,240,0.45);
      --accent:  #7c9cff;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 1.25rem 3rem;
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      top: -140px; left: -160px;
      background: radial-gradient(circle, rgba(80,100,200,0.18), transparent 70%);
      animation: blobDrift 18s ease-in-out infinite alternate;
    }
    body::after {
      width: 400px; height: 400px;
      bottom: -120px; right: -120px;
      background: radial-gradient(circle, rgba(160,80,200,0.14), transparent 70%);
      animation: blobDrift 22s ease-in-out infinite alternate-reverse;
    }

    @keyframes blobDrift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    h1 {
      position: relative;
      z-index: 1;
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.4;
      letter-spacing: -0.01em;
    }

    #reason-box {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      min-height: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 48px rgba(0,0,0,0.4);
    }

    #reason-text {
      font-size: clamp(1rem, 3vw, 1.35rem);
      font-weight: 600;
      line-height: 1.65;
      text-align: center;
    }

    #counter {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1e2e;
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    #next-btn {
      position: relative;
      z-index: 1;
      background: rgba(124,156,255,0.12);
      border: 1px solid rgba(124,156,255,0.25);
      color: #a0b4ff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 13px 34px;
      border-radius: 99px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.25s ease, border-color 0.25s ease,
                  transform 0.18s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.25s ease;
    }
    #next-btn:hover {
      background: rgba(124,156,255,0.22);
      border-color: rgba(124,156,255,0.5);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 24px rgba(124,156,255,0.18);
    }
    #next-btn:active {
      transform: translateY(0) scale(0.97);
    }

    #honourable-mention {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 100%;
      min-height: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.8;
    }

    @keyframes cardFadeIn {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: cardFadeIn 0.5s ease forwards;
    }

    .rgb-title      { animation: rgb-cycle 4s linear infinite; }
    .rgb-bunikma    { animation: rgb-cycle 3s linear infinite; }
    .rgb-shimaqueen { animation: rgb-cycle 3s linear infinite; }
    .rgb-ghazi      { animation: rgb-green 3s linear infinite; }
    .rgb-nizam,
    .rgb-hatim      { animation: rgb-blue 3s linear infinite; }
    .rgb-lucky      { animation: rgb-yellow 3s linear infinite; }
    .rgb-luv        { color: pink; }
    .rgb-raisa      { color: #ffb6f9; }
    .rgb-feisya     { color: violet; }
    .rgb-mess       { animation: argentina 3s linear infinite; }
    .rgb-heart      { color: pink; }
    .rgb-mewing     { animation: rgb-hkb 3s linear infinite; }
    .rgb-mystery    { animation: rgb-mystery 3s linear infinite; }
    .rgb-watermelon { color: #ff6b8a; }

    @keyframes rgb-cycle   { 0%{color:red}     33%{color:lime}      66%{color:blue}    100%{color:red} }
    @keyframes rgb-green   { 0%{color:lime}    50%{color:greenyellow}                  100%{color:lime} }
    @keyframes rgb-blue    { 0%{color:#00cfff} 50%{color:#0099ff}                      100%{color:#00cfff} }
    @keyframes rgb-yellow  { 0%{color:yellow}  50%{color:gold}                         100%{color:yellow} }
    @keyframes argentina   { 0%{color:#75aadb} 33%{color:white}     66%{color:#f6c71c} 100%{color:#75aadb} }
    @keyframes rgb-hkb     { 0%{color:lime}    33%{color:yellow}    66%{color:cyan}    100%{color:lime} }
    @keyframes rgb-mystery { 0%{color:#ff00ff} 25%{color:#00ffff}   50%{color:#ff0000} 75%{color:#0000ff} 100%{color:#ff00ff} }
  </style>
</head>
<body>

  <h1 class="rgb-title">25 (10) Alasan <span class="rgb-bunikma">Ibu Nikma</span> Guru Kelas 5 Paling Keren ✨ <span style="font-size:0.6em;opacity:0.5;font-style:italic;">Reimagined</span></h1>

  <div id="reason-box">
    <span id="counter">1 / 10</span>
    <p id="reason-text"></p>
  </div>

  <button id="next-btn">lanjut ➡</button>

  <div id="honourable-mention">
    <p id="mention-text"></p>
  </div>

  <script>
    const reasons = [
      "1. <span class='rgb-bunikma'>Ibu Nikma</span> bisa membuat kalian percaya diri",
      "2. <span class='rgb-bunikma'>Ibu Nikma</span> bisa buat prestasi kalian lebih banyak dari piala dunia ronaldo",
      "3. <span class='rgb-bunikma'>Ibu Nikma</span> buat kalian menjadi pribadi yang jauh lebih baik",
      "4. <span class='rgb-bunikma'>Ibu Nikma</span> bisa mengajar sambil mengandung bayi",
      "5. <span class='rgb-bunikma'>Ibu Nikma</span> buat ulangan lebih menarik",
      "6. <span class='rgb-bunikma'>Ibu Nikma</span> guru paling kreatif dari 52 guru lainnya",
      "7. <span class='rgb-bunikma'>Ibu Nikma</span> selalu membuat kalian merasa aman jika sama dia",
      "8. <span class='rgb-bunikma'>Ibu Nikma</span> guru paling niat dari semua guru yang pernah nyentuh lahan sdn 81",
      "9. <span class='rgb-bunikma'>Ibu Nikma</span> orangnya wholesome",
      "10. <span class='rgb-bunikma'>Ibu Nikma</span> bisa membuat 1 tahun sekolah yang seharusnya penuh kemalasan dan cara mengajar yang boring jadi 1 tahun penuh kenangan yang berkesan penuh dengan emosi yang tercampur aduk"
    ];

    const honourable = "Dedicated to <span class='rgb-bunikma'>Bu Nikma</span>, <span class='rgb-ghazi'>Ghazi</span>, <span class='rgb-nizam'>Nizam</span>, <span class='rgb-hatim'>Hatim</span>, <span class='rgb-lucky'>Lucky</span> <span class='rgb-raisa'>Raisa</span>, <span class='rgb-feisya'>Feisya</span>, <span class='rgb-mess'>Messi</span>";

    let currentIndex = 0;
    const reasonText  = document.getElementById("reason-text");
    const mentionText = document.getElementById("mention-text");
    const nextBtn     = document.getElementById("next-btn");
    const counter     = document.getElementById("counter");

    function showReason(index) {
      reasonText.classList.remove('fade-in');
      void reasonText.offsetWidth;

      if (index < reasons.length) {
        reasonText.innerHTML  = reasons[index];
        counter.textContent   = `${index + 1} / 10`;
        counter.style.display = '';
        mentionText.innerHTML = "";
        nextBtn.textContent   = index === reasons.length - 1 ? "selesai ✓" : "lanjut ➡";
      } else {
        reasonText.innerHTML  = "Udah :)) Keren kan bu";
        counter.style.display = 'none';
        mentionText.innerHTML = honourable;
        nextBtn.textContent   = "ulang 🔁";
      }

      reasonText.classList.add('fade-in');
    }

    nextBtn.addEventListener("click", () => {
      currentIndex++;
      if (currentIndex > reasons.length) currentIndex = 0;
      showReason(currentIndex);
    });

    showReason(currentIndex);
  </script>
</body>
</html>
